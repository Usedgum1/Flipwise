    <script>
(function() {
  var lastData = null;
  var searchQuery = '';
  var sortColumn = 'profit';
  var sortDir = 'desc';
  var FAVORITES_KEY = 'flipwise-favorites';
  var refreshBtn = document.getElementById('refresh-btn');

  function getFavorites() { try { var r = localStorage.getItem(FAVORITES_KEY); return r ? JSON.parse(r) : []; } catch (e) { return []; } }
  function setFavorites(arr) { try { localStorage.setItem(FAVORITES_KEY, JSON.stringify(arr)); } catch (e) {} }
  function toggleFavorite(name) {
    var arr = getFavorites();
    var i = arr.indexOf(name);
    if (i >= 0) arr.splice(i, 1); else arr.push(name);
    setFavorites(arr);
  }
  function isFavorite(name) { return getFavorites().indexOf(name) >= 0; }

  function escapeHtml(s) {
    if (s == null) return '';
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }
  function fmtProfit(p) {
    if (p == null) return '—';
    return (p >= 0 ? '+' : '') + Number(p).toLocaleString() + ' gp';
  }
  function timeAgo(ts) {
    if (ts == null || ts === undefined) return '—';
    var ms = (typeof ts === 'number' && ts < 1e12) ? ts * 1000 : ts;
    var sec = Math.floor((Date.now() - ms) / 1000);
    if (sec < 60) return 'Just now';
    if (sec < 3600) return Math.floor(sec / 60) + ' min ago';
    return (sec / 3600).toFixed(1) + ' hr ago';
  }
  var WIKI_ICON_BASE = 'https://oldschool.runescape.wiki/images/';
  function itemIconHtml(d, fallbackLetter) {
    var letter = fallbackLetter || (d && (d.name || '').charAt(0)) || '';
    if (d && d.icon) {
      var filename = String(d.icon).replace(/ /g, '_');
      var url = WIKI_ICON_BASE + encodeURIComponent(filename);
      return '<img src="' + escapeHtml(url) + '" alt="" class="item-icon" loading="lazy" referrerpolicy="no-referrer" data-fallback="' + escapeHtml(letter) + '" onerror="var f=this.getAttribute(\'data-fallback\')||\'?\'; var s=document.createElement(\'span\'); s.className=\'item-icon-fallback\'; s.textContent=f; this.parentNode.replaceChild(s,this);">';
    }
    return '<span class="item-icon-fallback">' + escapeHtml(letter) + '</span>';
  }

  function setSortIndicator() {
    var row = document.getElementById('scannerTableHeadRow');
    if (!row) return;
    row.querySelectorAll('th[data-sort]').forEach(function(th) {
      var col = th.getAttribute('data-sort');
      th.classList.remove('sort-asc', 'sort-desc');
      if (col === sortColumn) th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    });
  }

  function fillTable(data) {
    var tbody = document.getElementById('scannerTableBody');
    if (!tbody) return;
    var dataset = (data && data.scannerData) ? data.scannerData : {};
    var rows = [];
    for (var name in dataset) {
      if (Object.prototype.hasOwnProperty.call(dataset, name))
        rows.push({ name: name, d: dataset[name] });
    }
    if (searchQuery.trim()) {
      var q = searchQuery.trim().toLowerCase();
      rows = rows.filter(function(r) { return (r.name || '').toLowerCase().indexOf(q) >= 0; });
    }
    var key = sortColumn;
    var mult = sortDir === 'asc' ? -1 : 1;
    rows.sort(function(a, b) {
      if (key === 'item') {
        var sa = (a.name || '').toLowerCase();
        var sb = (b.name || '').toLowerCase();
        return mult * (sa > sb ? 1 : sa < sb ? -1 : 0);
      }
      var va = a.d[key];
      var vb = b.d[key];
      if (key === 'profit' || key === 'low' || key === 'high' || key === 'roi') {
        va = va != null ? Number(va) : -Infinity;
        vb = vb != null ? Number(vb) : -Infinity;
        return mult * (vb - va);
      }
      if (key === 'highTime' || key === 'lowTime') {
        va = va != null ? va : 0;
        vb = vb != null ? vb : 0;
        return mult * (vb - va);
      }
      return 0;
    });
    tbody.innerHTML = '';
    if (rows.length === 0) {
      var tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="8" class="text-muted">' + (!dataset || Object.keys(dataset).length === 0 ? 'No scanner results. Try refreshing.' : 'No items match your search.') + '</td>';
      tbody.appendChild(tr);
      return;
    }
    rows.forEach(function(r) {
      var d = r.d;
      var low = d.low != null ? Number(d.low).toLocaleString() : '—';
      var high = d.high != null ? Number(d.high).toLocaleString() : '—';
      var profit = d.profit != null ? d.profit : 0;
      var profitClass = profit > 0 ? 'positive' : profit < 0 ? 'negative' : '';
      var roi = d.roi != null ? Number(d.roi).toFixed(1) + '%' : '—';
      var buyTime = timeAgo(d.lowTime);
      var sellTime = timeAgo(d.highTime);
      var fav = isFavorite(r.name);
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="market-table__td-item"><div class="coin-cell"><span class="coin-icon">' + itemIconHtml(d, r.name.charAt(0)) + '</span><span class="coin-name">' + escapeHtml(r.name) + '</span></div></td>' +
        '<td class="text-right market-table__td-num">' + low + '</td>' +
        '<td class="text-right market-table__td-num">' + high + '</td>' +
        '<td class="text-right market-table__td-num change-cell ' + profitClass + '">' + escapeHtml(fmtProfit(d.profit)) + '</td>' +
        '<td class="text-right market-table__td-num">' + roi + '</td>' +
        '<td class="text-right market-table__td-num">' + escapeHtml(buyTime) + '</td>' +
        '<td class="text-right market-table__td-num">' + escapeHtml(sellTime) + '</td>' +
        '<td class="market-table__td-star"><button type="button" class="star-btn' + (fav ? ' star-btn--on' : '') + '" aria-label="Favorite" title="' + (fav ? 'Unfavorite' : 'Favorite') + '" data-item-name="' + escapeHtml(r.name) + '">' + (fav ? '★' : '☆') + '</button></td>';
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll('.star-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var name = btn.getAttribute('data-item-name');
        if (!name) return;
        toggleFavorite(name);
        var on = isFavorite(name);
        btn.classList.toggle('star-btn--on', on);
        btn.textContent = on ? '★' : '☆';
        btn.setAttribute('title', on ? 'Unfavorite' : 'Favorite');
      });
    });
  }

  function doRefresh() {
    if (refreshBtn) refreshBtn.disabled = true;
    if (typeof FlipwiseAPI === 'undefined') {
      var tbody = document.getElementById('scannerTableBody');
      if (tbody) tbody.innerHTML = '<tr><td colspan="8" class="text-muted">API unavailable.</td></tr>';
      if (refreshBtn) refreshBtn.disabled = false;
      return;
    }
    FlipwiseAPI.refresh().then(function(data) {
      lastData = data;
      var t = Date.now();
      try {
        localStorage.setItem('flipwise-last-refresh-ts', String(t));
        sessionStorage.setItem('flipwise-last-refresh-ts', String(t));
      } catch (e) {}
      fillTable(data);
    }).catch(function() {
      var tbody = document.getElementById('scannerTableBody');
      if (tbody) tbody.innerHTML = '<tr><td colspan="8" class="text-muted">Refresh failed.</td></tr>';
    }).finally(function() {
      if (refreshBtn) refreshBtn.disabled = false;
    });
  }

  if (refreshBtn) refreshBtn.addEventListener('click', doRefresh);

  document.getElementById('searchInput').addEventListener('input', function() {
    searchQuery = this.value;
    if (lastData) fillTable(lastData);
  });

  var table = document.querySelector('.market-table');
  if (table) {
    table.addEventListener('click', function(e) {
      var th = e.target && e.target.closest ? e.target.closest('th[data-sort]') : null;
      if (!th) return;
      var col = th.getAttribute('data-sort');
      if (!col) return;
      if (sortColumn === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortColumn = col; sortDir = 'desc'; }
      setSortIndicator();
      if (lastData) fillTable(lastData);
    });
  }

  setSortIndicator();
  doRefresh();
})();
    </script>
