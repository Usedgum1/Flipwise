    <script>
(function() {
  var refreshBtn = document.getElementById('refresh-btn');
  var container = document.getElementById('moneyMakerTiles');

  function escapeHtml(s) {
    if (s == null) return '';
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function formatValue(profit) {
    if (profit == null || profit === 0) return '—';
    var n = Number(profit);
    return (n >= 0 ? '+' : '') + n.toLocaleString() + ' gp';
  }

  function fmtNum(n) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toLocaleString();
  }

  var WIKI_ICON_BASE = 'https://oldschool.runescape.wiki/images/';
  function iconImg(icon) {
    if (!icon) return '';
    var filename = String(icon).replace(/ /g, '_');
    var url = WIKI_ICON_BASE + encodeURIComponent(filename);
    return '<img class="mm-item-icon" src="' + escapeHtml(url) + '" alt="">';
  }
  function rowWithIcon(icon, label, val) {
    var left = icon ? ('<span class="mm-row-left">' + iconImg(icon) + '<span class="mm-label">' + label + '</span></span>') : ('<span class="mm-label">' + label + '</span>');
    return '<div class="mm-row">' + left + '<span class="mm-val">' + val + '</span></div>';
  }

  function buildBreakdownHtml(t) {
    var b = t.breakdown;
    if (!b) return '';
    var F = window.Flipwise;
    var key = t.key;
    var html = [];
    if (key === 'knife' && b.knives && b.knives.length) {
      var best = b.best_knife || '';
      b.knives.forEach(function(k) {
        var rowClass = (k.name === best) ? ' mm-row mm-winner' : ' mm-row';
        var icon = iconImg(k.icon);
        var left = k.icon ? ('<span class="mm-row-left">' + icon + '<span class="mm-label">' + escapeHtml(k.name) + ': </span></span>') : ('<span class="mm-label">' + escapeHtml(k.name) + ': </span>');
        html.push('<div class="' + rowClass + '">' + left + '<span class="mm-val">B: ' + fmtNum(k.buy) + ' S: ' + fmtNum(k.sell) + '</span></div>');
      });
    } else if (key === 'cannon') {
      var cannonItems = (F && F.CANNON_ITEMS) || [{ name: 'Cannon base' }, { name: 'Cannon stand' }, { name: 'Cannon barrels' }, { name: 'Cannon furnace' }];
      var partIcons = b.part_icons || [];
      [b.part1, b.part2, b.part3, b.part4].forEach(function(val, i) {
        var partName = cannonItems[i] ? cannonItems[i].name : 'Part';
        html.push(rowWithIcon(partIcons[i], 'GE ' + escapeHtml(partName) + ': ', fmtNum(val) + ' gp'));
      });
      html.push(rowWithIcon(b.cannon_icon, 'GE Cannon: ', fmtNum(b.cannon_sell) + ' gp'));
      var pp = b.parts_profit;
      var np = b.nulodion_profit;
      var partsStr = (pp != null) ? ((pp >= 0 ? '+' : '') + fmtNum(pp) + ' gp') : '—';
      var nulStr = (np != null) ? ((np >= 0 ? '+' : '') + fmtNum(np) + ' gp') : '—';
      var partsWin = (pp != null && np != null && pp >= np);
      var nulWin = (np != null && (pp == null || np > pp));
      html.push('<div class="mm-row' + (partsWin ? ' mm-winner' : '') + '"><span class="mm-label">GE Bought Parts: </span><span class="mm-val">' + partsStr + '</span></div>');
      html.push('<div class="mm-row' + (nulWin ? ' mm-winner' : '') + '"><span class="mm-label">Nulodion: </span><span class="mm-val">' + nulStr + '</span></div>');
    } else if (key === 'odium' && (F && F.ODIUM_SHARD_ITEMS)) {
      var odiumIcons = b.part_icons || [];
      F.ODIUM_SHARD_ITEMS.forEach(function(item, i) {
        var v = [b.part1, b.part2, b.part3][i];
        html.push(rowWithIcon(odiumIcons[i], escapeHtml(item.name) + ': ', fmtNum(v) + ' gp'));
      });
      html.push(rowWithIcon(b.ward_icon, 'Odium ward: ', fmtNum(b.ward_sell) + ' gp'));
    } else if (key === 'malediction' && (F && F.MALEDICTION_SHARD_ITEMS)) {
      var malIcons = b.part_icons || [];
      F.MALEDICTION_SHARD_ITEMS.forEach(function(item, i) {
        var v = [b.part1, b.part2, b.part3][i];
        html.push(rowWithIcon(malIcons[i], escapeHtml(item.name) + ': ', fmtNum(v) + ' gp'));
      });
      html.push(rowWithIcon(b.ward_icon, 'Malediction ward: ', fmtNum(b.ward_sell) + ' gp'));
    } else if (key === 'bandit') {
      html.push(rowWithIcon(b.ge_sell_icon, 'Bandit Trader: ', '750 gp'));
      html.push(rowWithIcon(b.ge_sell_icon, 'GE Sell Rate: ', fmtNum(b.ge_sell) + ' gp'));
      var profitPerStr = (b.profit_per != null) ? ((b.profit_per >= 0 ? '+' : '') + fmtNum(b.profit_per) + ' gp') : '—';
      html.push('<div class="mm-row"><span class="mm-label">Profit per: </span><span class="mm-val">' + profitPerStr + '</span></div>');
      var rate = b.hourly_rate != null ? b.hourly_rate : 929;
      var perHourStr = (b.profit_per_hour != null) ? ((b.profit_per_hour >= 0 ? '+' : '') + fmtNum(b.profit_per_hour) + ' gp') : '—';
      html.push('<div class="mm-row' + (b.profit_per_hour != null && b.profit_per_hour >= 0 ? ' mm-winner' : (b.profit_per_hour != null && b.profit_per_hour < 0 ? ' mm-negative' : '')) + '"><span class="mm-label">Per Hour (~' + rate + '): </span><span class="mm-val">' + perHourStr + '</span></div>');
    } else if (key === 'soul_rune') {
      html.push('<div class="mm-row"><span class="mm-label">Wizard Akutha (50): </span><span class="mm-val">308 gp</span></div>');
      html.push('<div class="mm-row mm-winner"><span class="mm-label">Wizard Akutha (100): </span><span class="mm-val">315 gp</span></div>');
      html.push('<div class="mm-row"><span class="mm-label">Wizard Akutha (150): </span><span class="mm-val">338 gp</span></div>');
      html.push(rowWithIcon(b.ge_buy_icon, 'Approx. GE Price: ', fmtNum(b.ge_buy) + ' gp'));
    } else if (key === 'dragonbreath') {
      html.push(rowWithIcon(b.dragonfruit_icon, 'Cost Per: ', fmtNum(b.cost_per) + ' gp'));
      html.push(rowWithIcon(b.dragonfruit_icon, 'Cost Per 10: ', fmtNum(b.cost_per_10) + ' gp'));
      html.push(rowWithIcon(b.product_icon, 'Bottled Dragonbreath: ', fmtNum(b.product_value) + ' gp'));
      var profitPerStr = (b.profit_per != null) ? ((b.profit_per >= 0 ? '+' : '') + fmtNum(b.profit_per) + ' gp') : '—';
      html.push('<div class="mm-row"><span class="mm-label">Profit per: </span><span class="mm-val">' + profitPerStr + '</span></div>');
      var rate = b.hourly_rate != null ? b.hourly_rate : 450;
      var perHourStr = (b.profit_per_hour != null) ? ((b.profit_per_hour >= 0 ? '+' : '') + fmtNum(b.profit_per_hour) + ' gp') : '—';
      html.push('<div class="mm-row' + (b.profit_per_hour != null && b.profit_per_hour >= 0 ? ' mm-winner' : (b.profit_per_hour != null && b.profit_per_hour < 0 ? ' mm-negative' : '')) + '"><span class="mm-label">Per Hour (~' + rate + '): </span><span class="mm-val">' + perHourStr + '</span></div>');
    } else if (key === 'mithril_seeds') {
      html.push(rowWithIcon(b.seed_icon, 'Mithril Seed: ', fmtNum(b.fixed_gp) + ' gp'));
      html.push(rowWithIcon(b.seed_icon, 'Mithril Seed: ', fmtNum(b.ge_price) + ' gp'));
      var profitPerStr = (b.profit_per != null) ? ((b.profit_per >= 0 ? '+' : '') + fmtNum(b.profit_per) + ' gp') : '—';
      html.push('<div class="mm-row"><span class="mm-label">Profit per: </span><span class="mm-val">' + profitPerStr + '</span></div>');
      var rate = b.hourly_rate != null ? b.hourly_rate : 1945;
      var perHourStr = (b.profit_per_hour != null) ? ((b.profit_per_hour >= 0 ? '+' : '') + fmtNum(b.profit_per_hour) + ' gp') : '—';
      html.push('<div class="mm-row' + (b.profit_per_hour != null && b.profit_per_hour >= 0 ? ' mm-winner' : (b.profit_per_hour != null && b.profit_per_hour < 0 ? ' mm-negative' : '')) + '"><span class="mm-label">Per Hour (~' + rate + '): </span><span class="mm-val">' + perHourStr + '</span></div>');
    }
    if (html.length === 0) return '';
    return '<div class="mm-tile-breakdown">' + html.join('') + '</div>';
  }

  function renderTiles(tiles, bestKey) {
    if (!container) return;
    container.innerHTML = '';
    if (!tiles || tiles.length === 0) {
      container.innerHTML = '<div class="balance-card mm-tile"><div class="mm-tile-title">No data</div><div class="mm-tile-breakdown"></div><div class="mm-tile-profit">—</div></div>';
      return;
    }
    tiles.forEach(function(t) {
      var isPrimary = bestKey && t.key === bestKey && t.profit > 0;
      var card = document.createElement('div');
      card.className = 'balance-card mm-tile' + (isPrimary ? ' primary' : '');
      var valueStr = t.profit > 0 ? formatValue(t.profit) : (t.profit < 0 ? formatValue(t.profit) : 'Inactive');
      if (t.profit === 0) valueStr = 'Inactive';
      var profitClass = 'mm-tile-profit' + (t.profit < 0 ? ' negative' : '');
      var breakdownHtml = buildBreakdownHtml(t);
      card.innerHTML =
        '<div class="mm-tile-title">' + escapeHtml(t.title) + '</div>' +
        breakdownHtml +
        '<div class="' + profitClass + '">' + escapeHtml(valueStr) + '</div>';
      container.appendChild(card);
    });
  }

  function doRefresh() {
    if (refreshBtn) refreshBtn.disabled = true;
    if (typeof FlipwiseAPI === 'undefined') {
      renderTiles([], null);
      if (refreshBtn) refreshBtn.disabled = false;
      return;
    }
    FlipwiseAPI.refresh().then(function(data) {
      var tiles = data.moneyMakerTiles || [];
      var bestKey = data.moneyMakerBestKey || null;
      renderTiles(tiles, bestKey);
      var t = Date.now();
      try {
        localStorage.setItem('flipwise-last-refresh-ts', String(t));
        sessionStorage.setItem('flipwise-last-refresh-ts', String(t));
      } catch (e) {}
    }).catch(function() {
      renderTiles([], null);
    }).finally(function() {
      if (refreshBtn) refreshBtn.disabled = false;
    });
  }

  if (refreshBtn) refreshBtn.addEventListener('click', doRefresh);
  doRefresh();
})();
    </script>
    <script src="js/flipwise-ui.js"></script>
