    <script>
(function() {
  var refreshBtn = document.getElementById('refresh-btn');
  var container = document.getElementById('outfitSetTiles');

  function escapeHtml(s) {
    if (s == null) return '';
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function formatValue(profit) {
    if (profit == null || profit === 0) return '—';
    var n = Number(profit);
    return (n >= 0 ? '+' : '') + n.toLocaleString() + ' gp';
  }

  function fmtNum(n) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toLocaleString();
  }

  var WIKI_ICON_BASE = 'https://oldschool.runescape.wiki/images/';
  function iconImg(icon) {
    if (!icon) return '';
    var filename = String(icon).replace(/ /g, '_');
    var url = WIKI_ICON_BASE + encodeURIComponent(filename);
    return '<img class="mm-item-icon" src="' + escapeHtml(url) + '" alt="">';
  }

  function buildBreakdownHtml(t) {
    var b = t.breakdown;
    if (!b) return '';
    var html = [];
    if (b.set_to_items) {
      var sti = b.set_to_items;
      html.push('<div class="mm-breakdown-section-label">Items → Set</div>');
      if (b.materials && b.materials.length) {
        b.materials.forEach(function(m) {
          var label = escapeHtml(m.name) + (m.qty > 1 ? ' × ' + m.qty : '') + ': ';
          var val = fmtNum(m.cost) + ' gp';
          var icon = iconImg(m.icon);
          html.push('<div class="mm-row"><span class="mm-row-left">' + icon + '<span class="mm-label">' + label + '</span></span><span class="mm-val">' + val + '</span></div>');
        });
      }
      html.push('<div class="mm-group-divider"></div>');
      html.push('<div class="mm-row"><span class="mm-row-left">' + iconImg(b.product_icon) + '<span class="mm-label">' + escapeHtml(b.product_name || '') + ': </span></span><span class="mm-val">' + fmtNum(b.product_value) + ' gp</span></div>');
      var profitClass = (b.profit_after_tax != null && b.profit_after_tax < 0) ? ' mm-row mm-negative' : (b.profit_after_tax != null && b.profit_after_tax >= 0 ? ' mm-row mm-winner' : ' mm-row');
      html.push('<div class="' + profitClass + '"><span class="mm-label">Profit: </span><span class="mm-val">' + (b.profit_after_tax != null ? (b.profit_after_tax >= 0 ? '+' : '') + fmtNum(b.profit_after_tax) + ' gp' : '—') + '</span></div>');
      html.push('<div class="mm-divider"></div>');
      html.push('<div class="mm-breakdown-section-label">Set → Items</div>');
      html.push('<div class="mm-row"><span class="mm-row-left">' + iconImg(sti.set_icon) + '<span class="mm-label">' + escapeHtml(sti.set_name || '') + ': </span></span><span class="mm-val">' + fmtNum(sti.set_buy) + ' gp</span></div>');
      html.push('<div class="mm-group-divider"></div>');
      if (sti.pieces && sti.pieces.length) {
        sti.pieces.forEach(function(p) {
          var label = escapeHtml(p.name) + (p.qty > 1 ? ' × ' + p.qty : '') + ': ';
          var val = fmtNum(p.sell_after_tax) + ' gp';
          var icon = iconImg(p.icon);
          html.push('<div class="mm-row"><span class="mm-row-left">' + icon + '<span class="mm-label">' + label + '</span></span><span class="mm-val">' + val + '</span></div>');
        });
      }
      var stiProfitClass = (sti.profit != null && sti.profit < 0) ? ' mm-row mm-negative' : (sti.profit != null && sti.profit >= 0 ? ' mm-row mm-winner' : ' mm-row');
      html.push('<div class="' + stiProfitClass + '"><span class="mm-label">Profit: </span><span class="mm-val">' + (sti.profit != null ? (sti.profit >= 0 ? '+' : '') + fmtNum(sti.profit) + ' gp' : '—') + '</span></div>');
    } else if (b.materials && b.materials.length) {
      b.materials.forEach(function(m) {
        var label = escapeHtml(m.name) + (m.qty > 1 ? ' × ' + m.qty : '') + ': ';
        var val = fmtNum(m.cost) + ' gp';
        var icon = iconImg(m.icon);
        html.push('<div class="mm-row"><span class="mm-row-left">' + icon + '<span class="mm-label">' + label + '</span></span><span class="mm-val">' + val + '</span></div>');
      });
      html.push('<div class="mm-divider"></div>');
      html.push('<div class="mm-row"><span class="mm-label"><strong>Total cost:</strong> </span><span class="mm-val">' + fmtNum(b.total_cost) + ' gp</span></div>');
      var productIcon = iconImg(b.product_icon);
      html.push('<div class="mm-row"><span class="mm-row-left">' + productIcon + '<span class="mm-label"><strong>' + escapeHtml(b.product_name || '') + ':</strong> </span></span><span class="mm-val">' + fmtNum(b.product_value) + ' gp</span></div>');
      var profitClass = (b.profit_before_tax != null && b.profit_before_tax < 0) ? ' mm-row mm-negative' : ' mm-row';
      html.push('<div class="' + profitClass + '"><span class="mm-label"><strong>Profit:</strong> </span><span class="mm-val">' + (b.profit_before_tax != null ? (b.profit_before_tax >= 0 ? '+' : '') + fmtNum(b.profit_before_tax) + ' gp' : '—') + '</span></div>');
      html.push('<div class="mm-row"><span class="mm-label"><strong>Tax:</strong> </span><span class="mm-val">' + (b.tax != null ? fmtNum(b.tax) + ' gp' : '—') + '</span></div>');
      var afterTaxClass = (b.profit_after_tax != null && b.profit_after_tax < 0) ? ' mm-row mm-negative' : ' mm-row';
      html.push('<div class="' + afterTaxClass + '"><span class="mm-label"><strong>Profit after GE Tax:</strong> </span><span class="mm-val">' + (b.profit_after_tax != null ? (b.profit_after_tax >= 0 ? '+' : '') + fmtNum(b.profit_after_tax) + ' gp' : '—') + '</span></div>');
    } else if (b.rows && b.rows.length) {
      b.rows.forEach(function(r) {
        var rowClass = ' mm-row';
        if (r.winner) rowClass += ' mm-winner';
        if (r.profit != null && r.profit < 0) rowClass += ' mm-negative';
        var label = escapeHtml(r.label || '');
        var val = r.value != null ? escapeHtml(String(r.value)) : '—';
        html.push('<div class="' + rowClass + '"><span class="mm-label">' + label + '</span><span class="mm-val">' + val + '</span></div>');
      });
    }
    if (html.length === 0) return '';
    return '<div class="mm-tile-breakdown">' + html.join('') + '</div>';
  }

  function renderTiles(tiles, bestKey) {
    if (!container) return;
    container.innerHTML = '';
    if (!tiles || tiles.length === 0) {
      container.innerHTML = '<div class="balance-card mm-tile"><div class="mm-tile-title">No data</div><div class="mm-tile-breakdown"></div><div class="mm-tile-profit">—</div></div>';
      return;
    }
    tiles.forEach(function(t) {
      var isPrimary = bestKey && t.key === bestKey && t.profit > 0;
      var card = document.createElement('div');
      card.className = 'balance-card mm-tile' + (isPrimary ? ' primary' : '');
      var valueStr = t.profit > 0 ? formatValue(t.profit) : (t.profit < 0 ? formatValue(t.profit) : 'Inactive');
      if (t.profit === 0) valueStr = 'Inactive';
      var profitClass = 'mm-tile-profit' + (t.profit < 0 ? ' negative' : '');
      var breakdownHtml = buildBreakdownHtml(t);
      card.innerHTML =
        '<div class="mm-tile-title">' + escapeHtml(t.title) + '</div>' +
        breakdownHtml +
        '<div class="' + profitClass + '">' + escapeHtml(valueStr) + '</div>';
      container.appendChild(card);
    });
  }

  function doRefresh() {
    if (refreshBtn) refreshBtn.disabled = true;
    if (typeof FlipwiseAPI === 'undefined') {
      renderTiles([], null);
      if (refreshBtn) refreshBtn.disabled = false;
      return;
    }
    FlipwiseAPI.refresh().then(function(data) {
      var tiles = data.outfitSetTiles || [];
      var bestKey = data.outfitSetBestKey || null;
      renderTiles(tiles, bestKey);
      var t = Date.now();
      try {
        localStorage.setItem('flipwise-last-refresh-ts', String(t));
        sessionStorage.setItem('flipwise-last-refresh-ts', String(t));
      } catch (e) {}
    }).catch(function() {
      renderTiles([], null);
    }).finally(function() {
      if (refreshBtn) refreshBtn.disabled = false;
    });
  }

  if (refreshBtn) refreshBtn.addEventListener('click', doRefresh);
  doRefresh();
})();
    </script>
    <script src="js/flipwise-ui.js"></script>
</body>
